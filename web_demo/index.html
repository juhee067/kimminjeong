<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple To-Do Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <h1>간단한 투두 리스트</h1>
    <form id="todo-form">
      <input id="todo-input" placeholder="새 할 일을 입력하세요" autocomplete="off">
      <button type="submit">추가</button>
    </form>
    <ul id="todo-list"></ul>
  </div>
  <script src="script.js"></script>
</body>
</html>
